<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gran Mar 🐠</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #051030; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
    #gameContainer {
      position: relative;
      width: 100%;
      max-width: 900px;
      height: 100vh;
      max-height: 600px;
      overflow: hidden;
      cursor: none;
    }
    #gameCanvas { display: block; width: 100%; height: 100%; }
    #hud {
      position: absolute; top: 12px; left: 16px;
      display: flex; gap: 12px; align-items: center; pointer-events: none;
    }
    .hud-pill {
      background: rgba(0,0,0,0.5); color: #fff;
      font-size: 13px; padding: 5px 12px; border-radius: 20px;
      display: flex; align-items: center; gap: 6px;
    }
    #shopBtn {
      position: absolute; top: 12px; right: 16px;
      background: rgba(0,0,0,0.55); color: #FFD700;
      font-size: 13px; font-weight: 500;
      border: 1.5px solid rgba(255,215,0,0.6);
      border-radius: 20px; padding: 5px 14px; cursor: pointer;
    }
    #shopBtn:hover { background: rgba(0,0,0,0.85); }
    #shopOverlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center; justify-content: center; z-index: 10;
    }
    #shopOverlay.visible { display: flex; }
    #shopPanel {
      background: #0a1628; border: 1.5px solid rgba(255,215,0,0.5);
      border-radius: 14px; padding: 24px 28px; width: 300px; color: #fff;
    }
    #shopPanel h2 { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .coins-display { font-size: 13px; color: #FFD700; margin-bottom: 18px; }
    .shop-item {
      background: rgba(255,255,255,0.07); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .shop-item .info p { font-size: 13px; color: #aaa; margin-top: 2px; }
    .shop-item .info strong { font-size: 14px; }
    .buy-btn {
      background: #FFD700; color: #111; border: none;
      border-radius: 8px; padding: 6px 12px; font-size: 12px;
      font-weight: 500; cursor: pointer; white-space: nowrap;
    }
    .buy-btn:hover { background: #ffe84d; }
    .buy-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
    #closeShop {
      display: block; width: 100%; margin-top: 14px;
      background: transparent; border: 1px solid rgba(255,255,255,0.2);
      color: #ccc; border-radius: 8px; padding: 8px;
      font-size: 13px; cursor: pointer;
    }
    #closeShop:hover { background: rgba(255,255,255,0.07); }
    #deathScreen, #startScreen {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center; justify-content: center;
      z-index: 10; flex-direction: column; gap: 14px;
      color: #fff; text-align: center;
    }
    #deathScreen.visible, #startScreen.visible { display: flex; }
    #deathScreen h2, #startScreen h2 { font-size: 24px; font-weight: 500; }
    #deathScreen p, #startScreen p { font-size: 14px; color: #ccc; max-width: 280px; }
    #restartBtn, #startBtn {
      background: #FFD700; color: #111; border: none;
      border-radius: 10px; padding: 11px 30px;
      font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 6px;
    }
    #restartBtn:hover, #startBtn:hover { background: #ffe84d; }
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div class="hud-pill">🐟 Tamaño: <span id="sizeDisplay">20</span></div>
      <div class="hud-pill">🪙 <span id="coinsDisplay">0</span></div>
      <div class="hud-pill">⚡ <span id="speedDisplay">1.0</span>x</div>
    </div>
    <button id="shopBtn">🛒 Tienda</button>
    <div id="shopOverlay">
      <div id="shopPanel">
        <h2>🛒 Tienda del océano</h2>
        <div class="coins-display">🪙 Monedas: <span id="shopCoins">0</span></div>
        <div class="shop-item">
          <div class="info">
            <strong>Aumentar tamaño</strong>
            <p>+5 de tamaño · 🪙 <span id="sizePrice">15</span></p>
          </div>
          <button class="buy-btn" id="buySize">Comprar</button>
        </div>
        <div class="shop-item">
          <div class="info">
            <strong>Aumentar velocidad</strong>
            <p>+0.3 de velocidad · 🪙 <span id="speedPrice">20</span></p>
          </div>
          <button class="buy-btn" id="buySpeed">Comprar</button>
        </div>
        <button id="closeShop">Cerrar</button>
      </div>
    </div>
    <div id="deathScreen">
      <h2>💀 ¡Fuiste comido!</h2>
      <p>Un pez más grande te atrapó</p>
      <button id="restartBtn">Intentar de nuevo</button>
    </div>
    <div id="startScreen" class="visible">
      <h2>🐠 Gran Mar</h2>
      <p>Come peces más pequeños para crecer. ¡Cuidado con los grandes!</p>
      <button id="startBtn">Jugar</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('gameContainer');
    let W, H;
    function resize() { W = canvas.width = container.clientWidth; H = canvas.height = container.clientHeight; }
    resize();
    window.addEventListener('resize', resize);

    const FISH_COLORS = ['#FF6B6B','#FF9F43','#FECA57','#48DBFB','#FF9FF3','#54A0FF','#5F27CD','#00D2D3','#1DD1A1','#C8D6E5'];
    let player, fishes, coins, playerSpeed, gameRunning, animId;
    let sizePriceLevel = 0, speedPriceLevel = 0;
    const sizePriceBase = 15, speedPriceBase = 20;
    function getSizePrice() { return sizePriceBase + sizePriceLevel * 8; }
    function getSpeedPrice() { return speedPriceBase + speedPriceLevel * 10; }

    function initGame() {
      player = { x: W/2, y: H/2, size: 20, angle: 0, color: '#1DD1A1' };
      fishes = []; coins = 0; playerSpeed = 1.0; gameRunning = true;
      for (let i = 0; i < 18; i++) spawnFish();
      updateHUD();
    }

    function spawnFish() {
      const minS = Math.max(6, player.size * 0.3);
      const maxS = player.size * 2.2;
      const size = minS + Math.random() * (maxS - minS);
      let x, y;
      const side = Math.floor(Math.random() * 4);
      if (side===0){x=Math.random()*W;y=-size*2;}
      else if(side===1){x=W+size*2;y=Math.random()*H;}
      else if(side===2){x=Math.random()*W;y=H+size*2;}
      else{x=-size*2;y=Math.random()*H;}
      fishes.push({ x, y, size, angle: Math.random()*Math.PI*2, speed: 0.4+Math.random()*0.9, color: FISH_COLORS[Math.floor(Math.random()*FISH_COLORS.length)], wobble: Math.random()*Math.PI*2 });
    }

    let mouse = { x: 0, y: 0 };
    container.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mouse.x = e.clientX-r.left; mouse.y = e.clientY-r.top; });
    container.addEventListener('touchmove', e => { e.preventDefault(); const r = canvas.getBoundingClientRect(); mouse.x = e.touches[0].clientX-r.left; mouse.y = e.touches[0].clientY-r.top; }, {passive:false});

    function drawFish(f, isPlayer) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.angle);
      const s = f.size, col = f.color;
      ctx.beginPath(); ctx.ellipse(0,0,s,s*0.55,0,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
      ctx.beginPath(); ctx.moveTo(-s*0.8,0); ctx.lineTo(-s*1.5,-s*0.55); ctx.lineTo(-s*1.5,s*0.55); ctx.closePath();
      ctx.fillStyle=col; ctx.globalAlpha=0.75; ctx.fill(); ctx.globalAlpha=1;
      ctx.beginPath(); ctx.arc(s*0.4,-s*0.15,s*0.14,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
      ctx.beginPath(); ctx.arc(s*0.44,-s*0.15,s*0.07,0,Math.PI*2); ctx.fillStyle='#222'; ctx.fill();
      ctx.beginPath(); ctx.moveTo(0,-s*0.45); ctx.lineTo(s*0.15,-s*0.85); ctx.lineTo(-s*0.2,-s*0.5); ctx.closePath();
      ctx.fillStyle=col; ctx.globalAlpha=0.6; ctx.fill(); ctx.globalAlpha=1;
      if (isPlayer) { ctx.beginPath(); ctx.ellipse(0,0,s*1.05,s*0.6,0,0,Math.PI*2); ctx.strokeStyle='rgba(29,209,161,0.45)'; ctx.lineWidth=2; ctx.stroke(); }
      ctx.restore();
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,'#0a1628'); grad.addColorStop(1,'#051030');
      ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(255,255,255,0.04)';
      for(let i=0;i<20;i++){
        const bx=(Math.sin(Date.now()/3000+i*17)*0.5+0.5)*W;
        const by=((Date.now()/4000+i*0.13)%1)*H;
        ctx.beginPath(); ctx.arc(bx,by,2+Math.sin(i)*1.5,0,Math.PI*2); ctx.fill();
      }
    }

    let lastTime = 0;
    function gameLoop(ts) {
      if (!gameRunning) return;
      const dt = Math.min((ts-lastTime)/16.67, 3); lastTime = ts;
      ctx.clearRect(0,0,W,H); drawBackground();
      const dx=mouse.x-player.x, dy=mouse.y-player.y, dist=Math.sqrt(dx*dx+dy*dy), spd=playerSpeed*2.8;
      if(dist>3){ player.x+=(dx/dist)*spd*dt; player.y+=(dy/dist)*spd*dt; player.angle=Math.atan2(dy,dx); }
      player.x=Math.max(0,Math.min(W,player.x)); player.y=Math.max(0,Math.min(H,player.y));
      if(fishes.length<20) spawnFish();
      for(let i=fishes.length-1;i>=0;i--){
        const f=fishes[i];
        f.wobble+=0.04*dt; f.angle+=Math.sin(f.wobble)*0.015*dt;
        f.x+=Math.cos(f.angle)*f.speed*dt; f.y+=Math.sin(f.angle)*f.speed*dt;
        if(f.x<-f.size*3||f.x>W+f.size*3||f.y<-f.size*3||f.y>H+f.size*3){ fishes.splice(i,1); continue; }
        const ex=f.x-player.x, ey=f.y-player.y, ed=Math.sqrt(ex*ex+ey*ey);
        if(ed<player.size*0.9+f.size*0.5){
          if(f.size<player.size){ coins+=Math.max(1,Math.floor(f.size/4)); player.size+=f.size*0.08; fishes.splice(i,1); updateHUD(); }
          else{ die(); return; }
        }
        drawFish(f,false);
      }
      drawFish(player,true);
      animId=requestAnimationFrame(gameLoop);
    }

    function die() { gameRunning=false; document.getElementById('deathScreen').classList.add('visible'); }

    function updateHUD() {
      document.getElementById('sizeDisplay').textContent=Math.round(player.size);
      document.getElementById('coinsDisplay').textContent=coins;
      document.getElementById('speedDisplay').textContent=playerSpeed.toFixed(1);
      document.getElementById('shopCoins').textContent=coins;
    }

    function updateShopPrices() {
      document.getElementById('sizePrice').textContent=getSizePrice();
      document.getElementById('speedPrice').textContent=getSpeedPrice();
      document.getElementById('shopCoins').textContent=coins;
      document.getElementById('buySize').disabled=coins<getSizePrice();
      document.getElementById('buySpeed').disabled=coins<getSpeedPrice();
    }

    document.getElementById('shopBtn').onclick=()=>{ if(!gameRunning)return; updateShopPrices(); document.getElementById('shopOverlay').classList.add('visible'); };
    document.getElementById('closeShop').onclick=()=>{ document.getElementById('shopOverlay').classList.remove('visible'); };
    document.getElementById('buySize').onclick=()=>{ if(coins<getSizePrice())return; coins-=getSizePrice(); sizePriceLevel++; player.size+=5; updateHUD(); updateShopPrices(); };
    document.getElementById('buySpeed').onclick=()=>{ if(coins<getSpeedPrice())return; coins-=getSpeedPrice(); speedPriceLevel++; playerSpeed=Math.round((playerSpeed+0.3)*10)/10; updateHUD(); updateShopPrices(); };
    document.getElementById('startBtn').onclick=()=>{ document.getElementById('startScreen').classList.remove('visible'); mouse={x:W/2,y:H/2}; initGame(); animId=requestAnimationFrame(gameLoop); };
    document.getElementById('restartBtn').onclick=()=>{ document.getElementById('deathScreen').classList.remove('visible'); if(animId)cancelAnimationFrame(animId); sizePriceLevel=0; speedPriceLevel=0; initGame(); animId=requestAnimationFrame(gameLoop); };
  </script>
</body>
</html>
